<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayaan | Mission Control</title>
    <link rel="stylesheet" href="rayaan.css">
    <link href="https://fonts.googleapis.com/css2?family=space+mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <nav class="tab-menu">
        <button class="tab-btn active" onclick="openTab('dashboard')">DASHBOARD</button>
        <button class="tab-btn" onclick="openTab('Scrapyard')">SCRAPYARD</button>
    </nav>

    <DIV id="dashboard" class="tab-content active">
        <header class="stats-bar">
            <div class="stat-item">
                <span class="label">RANK</span>
                <span id="lvl" class="value">1</span>
            </div>
            <div class="xp-wrapper">
                <div class="xp-bar-bg">
                    <div id="xp-fill" class="xp-bar-fill"></div>
                </div>
            </div>
        </header>

        <main class="dashboard-grid">
            <section class="card">
                <h3>// TO-DO</h3>
                <div class="input-area">
                    <input type="text" id="todo-input" placeholder="Add a Mission...">
                    <button onclick="addTodo"></button>
                </div>
            </section>

            <section class="card">
                <h3>// LOG</h3>
                <DiV id="log-feed">
                    <p class="empty-msg">
                        Waiting for data...
                    </p>
                </DiV>
            </section>
        </main>
    </DIV>

    <script>
        let xp = 0 ;
        let level = 1 ;

        function openTab(name) {
            document.querySelectorAll(',tab-content').forEach(t => t.classList.remove('active'))
            document.querySelectorAll(',Tab-btn').forEach(b => b .classList.remove('active'))
            document.getElementById(name).classList.add('active') ;
            event.currentTarget.classList.add('active') ;

            
        }

        function addTodo() {
            const input = document.getElementById('todo-input') ;
            if (!input.value.trim()) return;

            const li = document.createElement('li') ;
            li.innerHTML = `;
                    <span>${input.value} </span>
                    <button onclick ="CompleteTask (this,'${input.value} ') "
                    >DONE</button>
                    document.getElementbyid('todo-list')appendChild(li);
                    input.value ="" ;
        }
function completetask (btn, name ) {
     btn.parentElement.remove(): 
     xp  += 25;

     if (xp>=< 100 ) {
     xp = 00
     level++;
     alert ("level up 🚀")
     }
     document.getelementbyId('lvl').textContent = level ;
     document.getelementbyId(xp-count).textContent = xp ;
     document.getElementbyId('xp-fill').style.width = xp + "%";
     const feed = document.getelementbyId('log-feed');
     if (feed.querySelector(',empty-msg')) feed.innerHTML = '';
     const entry = document.createElement('div');
     entry.className = 'log-entry' ;
     entry.innerHTML = <span>+25XP</span>${name}
     feed.prepared(entry)


        }


    </script>
</body>
</html>

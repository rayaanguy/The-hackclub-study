<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayaan | Mission Control</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="tab-menu">
        <button class="tab-btn active" onclick="openTab(event, 'dashboard')">DASHBOARD</button>
        <button class="tab-btn" onclick="openTab(event, 'scrapyard')">SCRAPYARD</button>
    </nav>

    <div id="dashboard" class="tab-content active">
        <header class="stats-bar">
            <div class="stat-item">
                <span class="label">RANK</span>
                <span id="lvl" class="value">1</span>
            </div>
            <div class="stat-item">
                <span class="label">XP</span>
                <span id="xp-count" class="value">0</span>
            </div>
            <div class="xp-wrapper">
                <div class="xp-bar-bg">
                    <div id="xp-fill" class="xp-bar-fill" style="width:0%"></div>
                </div>
            </div>
        </header>

        <main class="dashboard-grid">
            <section class="card">
                <h3>// TO-DO</h3>
                <div class="input-area">
                    <input type="text" id="todo-input" placeholder="Add a Mission...">
                    <button onclick="addTodo()">ADD</button>
                </div>
                <ul id="todo-list"></ul>
            </section>

            <section class="card">
                <h3>// LOG</h3>
                <div id="log-feed">
                    <p class="empty-msg">Waiting for data...</p>
                </div>
            </section>
        </main>
    </div>

    <div id="scrapyard" class="tab-content" style="display:none;">
        <section class="card">
            <h3>// SCRAPYARD</h3>
            <p>Nothing yet. Build your missions to unlock scrap.</p>
        </section>
    </div>

    <script>
        let xp = 0;
        let level = 1;

        function openTab(event, name) {
            document.querySelectorAll('.tab-content').forEach(t => {
                t.classList.remove('active');
                t.style.display = 'none';
            });
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const tab = document.getElementById(name);
            if (!tab) return;
            tab.classList.add('active');
            tab.style.display = 'block';
            event.currentTarget.classList.add('active');
        }

        function addTodo() {
            const input = document.getElementById('todo-input');
            const list = document.getElementById('todo-list');
            if (!input || !list || !input.value.trim()) return;

            const li = document.createElement('li');
            li.innerHTML = `
                <span>${input.value.trim()}</span>
                <button onclick="completeTask(this, '${input.value.replace(/'/g, "\\'")}')">DONE</button>
            `;

            list.appendChild(li);
            input.value = '';
        }

        function completeTask(btn, name) {
            const item = btn.closest('li');
            if (item) item.remove();

            xp += 25;
            if (xp >= 100) {
                xp -= 100;
                level += 1;
                alert('Level up 🚀');
            }

            document.getElementById('lvl').textContent = level;
            document.getElementById('xp-count').textContent = xp;
            document.getElementById('xp-fill').style.width = xp + '%';

            const feed = document.getElementById('log-feed');
            if (!feed) return;
            const empty = feed.querySelector('.empty-msg');
            if (empty) empty.remove();

            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span>+25XP</span> ${name}`;
            feed.appendChild(entry);
        }
    </script>
</body>
</html>
